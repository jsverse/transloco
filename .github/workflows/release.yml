name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = infer from conventional commits)'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
          - prerelease
      dry-run:
        description: 'Dry run (builds + packs + publish --dry-run; no real publish, commit, tag, or push)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

# Per-ref group: real releases (master-only) still serialize, while a
# dry-run dispatched from a branch never queue-blocks a real release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Real releases are master-only; dry-runs touch nothing remote (publish runs
  # with --dry-run; push/changelog are gated on !inputs.dry-run), so they may
  # be dispatched from any branch to test the pipeline
  gate:
    if: ${{ github.ref == 'refs/heads/master' || inputs.dry-run }}
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        target: ['ci:lint', 'ci:test', 'ci:e2e']
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/step-setup

      - name: Setup Playwright
        if: ${{ matrix.target == 'ci:e2e' }}
        uses: ./.github/actions/setup-playwright

      - name: Run ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
        run: npm run "$TARGET"

  release:
    needs: gate
    if: ${{ github.ref == 'refs/heads/master' || inputs.dry-run }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Mint a short-lived GitHub App installation token. The app is a bypass
      # actor on the master branch ruleset, so the release commit/tag push below
      # is authorized while humans still go through PRs + status checks. The
      # token is auto-revoked when the job ends (effective lifetime ≈ job run)
      # and is scoped to repo Contents only.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Least-privilege: the token only needs Contents (push release
          # commit/tag to master + create the GitHub Release). Declaring it
          # here enforces the scope at the workflow level instead of relying
          # solely on the app installation's configured permissions.
          permission-contents: write

      # Persist the app token so the later `git push HEAD:master` authenticates
      # as the bypass-capable app — the default GITHUB_TOKEN cannot push to the
      # protected branch (rejected with GH006)
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      # Shared setup: Node 24 + npm ci. It deliberately sets no registry-url,
      # which OIDC trusted publishing (below) depends on — see step-setup.
      - name: Setup
        uses: ./.github/actions/step-setup

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Always bump the manifests for real so the version is on disk for the
      # build + publish steps. On a dry run we pass --git-commit=false
      # --git-tag=false: the files are written (never pushed) so the publish
      # dry-run can pack a non-colliding version, but no commit or tag is made.
      # package.json is therefore the authoritative version source in both
      # modes (a stable JSON contract; drives the changelog + GitHub release).
      - name: Version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -o pipefail
          GIT_FLAGS=()
          if [[ "$DRY_RUN" == "true" ]]; then GIT_FLAGS=(--git-commit=false --git-tag=false); fi
          if [[ "$BUMP" == "auto" ]]; then
            npx nx release version --verbose "${GIT_FLAGS[@]}"
          else
            npx nx release version "$BUMP" --verbose "${GIT_FLAGS[@]}"
          fi
          VERSION=$(node -p "require('./libs/transloco/package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      # Build AFTER version so dist/ package.json files carry the bumped version
      - name: Build
        run: npm run ci:build

      # The releases/{version} tag must be on the remote BEFORE the changelog
      # step creates the GitHub release, otherwise the API invents the tag at
      # the old master HEAD
      - name: Push commit and tag
        if: ${{ !inputs.dry-run }}
        run: git push --follow-tags origin HEAD:master

      # Use the app token (not the default GITHUB_TOKEN): nx release changelog
      # both creates the GitHub Release and may push the changelog commit, so it
      # needs the bypass-capable identity for the push to protected master.
      - name: Changelog and GitHub release
        if: ${{ !inputs.dry-run }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx nx release changelog ${{ steps.version.outputs.value }} --verbose

      # The changelog step commits CHANGELOG.md locally — push it too
      - name: Push changelog commit
        if: ${{ !inputs.dry-run }}
        run: git push origin HEAD:master

      # Publish LAST: npm publish is irreversible, so it runs only after every
      # fallible git step (push to protected master, changelog, tag push) has
      # succeeded — preventing the npm-ahead-of-git split-brain that left 8.4.0
      # published while master stayed un-updated. Re-running is safe: nx skips
      # versions already on the registry. Always runs; on a dry run, --dry-run
      # packs the tarballs and exercises the publish path (version, packageRoot,
      # tag, access) without uploading — note this does NOT exercise OIDC auth,
      # which only a real publish does. Prereleases go to the `next` dist-tag so
      # `npm i @jsverse/transloco` (latest) never resolves to a prerelease.
      # Provenance attestations are generated automatically with trusted
      # publishing — no --provenance flag needed.
      - name: Publish to npm (OIDC trusted publishing + provenance)
        env:
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          TAG="latest"
          if [[ "$BUMP" == "prerelease" ]]; then TAG="next"; fi
          DRY=()
          if [[ "$DRY_RUN" == "true" ]]; then DRY=(--dry-run); fi
          npx nx release publish --access public --tag "$TAG" --verbose "${DRY[@]}"

      - name: Summary
        if: always()
        env:
          OUT_VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry-run }}
          REF: ${{ github.ref }}
          ACTOR: ${{ github.actor }}
        run: |
          {
            echo "## Release run"
            echo ""
            echo "- Version: \`${OUT_VERSION:-n/a}\`"
            echo "- Bump input: \`${BUMP}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            echo "- Ref: \`${REF}\`"
            echo "- Triggered by: @${ACTOR}"
          } >> "$GITHUB_STEP_SUMMARY"
